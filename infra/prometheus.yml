global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: harness-agent

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: harness-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: harness-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9091"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
