# =============================================================================
# Codex Harness — Full Infrastructure docker-compose
# =============================================================================
# Usage:
#   docker compose up -d                     # Start core services
#   docker compose --profile local-gpu up    # Start with vllm (GPU required)
#   docker compose --profile local-cpu up    # Start with llama.cpp (CPU)
# =============================================================================

x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  QDRANT_URL: http://qdrant:6333
  NEO4J_URL: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: harnesspassword
  MLFLOW_TRACKING_URI: http://mlflow:5000
  OTEL_EXPORTER_ENDPOINT: http://otel-collector:4317
  OTEL_SERVICE_NAME: codex-harness
  VECTOR_BACKEND: qdrant
  GRAPH_BACKEND: neo4j
  LOG_LEVEL: INFO

services:

  # -------------------------------------------------------------------------
  # Infrastructure: Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: harness-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Infrastructure: Qdrant vector store
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: harness-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Infrastructure: Neo4j graph store
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.19-community
    container_name: harness-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/harnesspassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 6
      start_period: 40s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Infrastructure: ChromaDB (optional alternative vector store)
  # -------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: harness-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "False"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Infrastructure: MLflow experiment tracking
  # -------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: harness-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Observability: OpenTelemetry Collector
  # -------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: harness-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./infra/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Observability: Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: harness-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Observability: Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: harness-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: harnesspassword
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/harness.json
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Application: API
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: harness-api
    restart: unless-stopped
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      WORKSPACE_BASE_PATH: /workspaces
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    volumes:
      - workspaces:/workspaces
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Application: Worker (2 replicas)
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      WORKSPACE_BASE_PATH: /workspaces
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    volumes:
      - workspaces:/workspaces
    depends_on:
      api:
        condition: service_healthy
    deploy:
      replicas: 2
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Application: Hermes self-improvement scheduler
  # -------------------------------------------------------------------------
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      target: hermes
    container_name: harness-hermes
    restart: unless-stopped
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      HERMES_AUTO_APPLY: ${HERMES_AUTO_APPLY:-false}
      HERMES_INTERVAL_SECONDS: ${HERMES_INTERVAL_SECONDS:-3600}
      HERMES_MIN_ERRORS_TO_TRIGGER: ${HERMES_MIN_ERRORS_TO_TRIGGER:-5}
      HERMES_PATCH_SCORE_THRESHOLD: ${HERMES_PATCH_SCORE_THRESHOLD:-0.7}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Optional: vllm (requires GPU — activate with --profile local-gpu)
  # -------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: harness-vllm
    profiles:
      - local-gpu
    restart: unless-stopped
    command: >
      --model ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.2}
      --host 0.0.0.0
      --port 8080
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    networks:
      - harness-net

  # -------------------------------------------------------------------------
  # Optional: llama.cpp (CPU — activate with --profile local-cpu)
  # -------------------------------------------------------------------------
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: harness-llamacpp
    profiles:
      - local-cpu
    restart: unless-stopped
    command: >
      -m /models/${LLAMACPP_MODEL:-mistral-7b-instruct-v0.2.Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8081
      --ctx-size 4096
      --threads ${LLAMACPP_THREADS:-4}
    ports:
      - "8081:8081"
    volumes:
      - ${LLAMACPP_MODEL_DIR:-./models}:/models:ro
    networks:
      - harness-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  chromadb_data:
    driver: local
  mlflow_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  workspaces:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  harness-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
